<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
    <clipPath id="globeClip">
      <circle cx="256" cy="226" r="60"/>
    </clipPath>
  </defs>

  <!-- Full-bleed background (platforms apply their own corner mask) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Soft shadow under the pin -->
  <ellipse cx="256" cy="430" rx="70" ry="16" fill="#000000" opacity="0.18"/>

  <!-- Map pin (teardrop) -->
  <path d="M256 96
           C176 96 116 158 116 238
           C116 326 214 372 256 442
           C298 372 396 326 396 238
           C396 158 336 96 256 96 Z"
        fill="#ffffff"/>

  <!-- Globe inside the pin head -->
  <g>
    <circle cx="256" cy="226" r="60" fill="#2563eb"/>
    <g clip-path="url(#globeClip)" stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round">
      <!-- equator + latitudes -->
      <line x1="196" y1="226" x2="316" y2="226"/>
      <line x1="206" y1="196" x2="306" y2="196"/>
      <line x1="206" y1="256" x2="306" y2="256"/>
      <!-- meridians -->
      <line x1="256" y1="166" x2="256" y2="286"/>
      <ellipse cx="256" cy="226" rx="28" ry="60"/>
    </g>
    <circle cx="256" cy="226" r="60" fill="none" stroke="#ffffff" stroke-width="5"/>
  </g>
</svg>
